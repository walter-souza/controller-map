name: Release

on:
  push:
    branches:
      - main

jobs:
  release:
    name: Build & Release (Windows)
    runs-on: windows-latest
    permissions:
      contents: write   # needed to create the GitHub Release

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build & package
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm run package

      - name: Upload installer as artifact
        uses: actions/upload-artifact@v4
        with:
          name: installer
          path: dist/controller-map-setup-*.exe
          if-no-files-found: error

      - name: Read version from package.json
        id: pkg
        shell: pwsh
        run: |
          $version = (Get-Content package.json | ConvertFrom-Json).version
          echo "version=$version" >> $env:GITHUB_OUTPUT

      - name: Zip portable build
        shell: pwsh
        run: Compress-Archive -Path dist/win-unpacked -DestinationPath dist/controller-map-portable-${{ steps.pkg.outputs.version }}.zip

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.pkg.outputs.version }}
          name: v${{ steps.pkg.outputs.version }}
          draft: false
          prerelease: false
          generate_release_notes: true
          files: |
            dist/controller-map-setup-*.exe
            dist/controller-map-portable-*.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
