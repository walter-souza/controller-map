<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 260" fill="none">
  <!-- Filtros e Efeitos Especiais de Iluminação e Sombra -->
  <defs>
    <!-- Sombra projetada do controle -->
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="6" stdDeviation="5" flood-color="#000000" flood-opacity="0.45"/>
    </filter>
    
    <!-- Efeito de brilho de LED (Glow) -->
    <filter id="glow-led" x="-25%" y="-25%" width="150%" height="150%">
      <feGaussianBlur stdDeviation="1.8" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>

    <!-- Gradientes para Carcaça e Punhos -->
    <linearGradient id="body-grad" x1="200" y1="58" x2="200" y2="216" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#212431" />
      <stop offset="40%" stop-color="#161822" />
      <stop offset="100%" stop-color="#0a0b0f" />
    </linearGradient>

    <!-- Gradiente dos Analógicos -->
    <radialGradient id="stick-base" cx="50%" cy="50%" r="50%">
      <stop offset="70%" stop-color="#090a0d" />
      <stop offset="90%" stop-color="#151821" />
      <stop offset="100%" stop-color="#252a3c" />
    </radialGradient>

    <linearGradient id="stick-top" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#242838" />
      <stop offset="100%" stop-color="#0d0e14" />
    </linearGradient>

    <!-- Gradientes de Metal dos Gatilhos -->
    <linearGradient id="metal-trigger" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2c3044" />
      <stop offset="50%" stop-color="#171924" />
      <stop offset="100%" stop-color="#0b0c12" />
    </linearGradient>

    <!-- Gradiente do D-pad -->
    <linearGradient id="dpad-grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#272c3f" />
      <stop offset="50%" stop-color="#181a25" />
      <stop offset="100%" stop-color="#0b0c11" />
    </linearGradient>

    <!-- Gradiente do Touchpad -->
    <linearGradient id="touchpad-grad" x1="200" y1="50" x2="200" y2="96" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#1c1f2b" />
      <stop offset="100%" stop-color="#10121a" />
    </linearGradient>
  </defs>

  <!-- Sombra de profundidade sob o controle -->
  <rect x="45" y="62" width="310" height="158" rx="30" fill="#000000" opacity="0.35" filter="blur(6px)"/>

  <!-- CONJUNTO DO CONTROLE (Playstation layout legítimo) -->
  <g filter="url(#shadow)">
    <!-- Chassi Principal (Corpo do Controle) -->
    <rect x="45" y="58" width="310" height="158" rx="30" fill="url(#body-grad)" stroke="#2b2f42" stroke-width="2"/>
    
    <!-- Linha de contorno interna elegante da faceplate (Bezel) -->
    <rect x="48" y="61" width="304" height="152" rx="27" fill="none" stroke="#ffffff" stroke-width="1" opacity="0.06"/>

    <!-- Gatilhos Superiores L2 e R2 (Com bordas arredondadas e chanfros suaves) -->
    <!-- L2 Trigger -->
    <rect x="45" y="20" width="72" height="28" rx="14" fill="url(#metal-trigger)" stroke="#3f455e" stroke-width="1.2"/>
    <text x="81" y="38" text-anchor="middle" font-family="sans-serif" font-weight="900" font-size="11" fill="#444a6b" letter-spacing="1">L2</text>

    <!-- R2 Trigger -->
    <rect x="283" y="20" width="72" height="28" rx="14" fill="url(#metal-trigger)" stroke="#3f455e" stroke-width="1.2"/>
    <text x="319" y="38" text-anchor="middle" font-family="sans-serif" font-weight="900" font-size="11" fill="#444a6b" letter-spacing="1">R2</text>

    <!-- Bumpers L1 e R1 -->
    <!-- L1 Bumper -->
    <rect x="47" y="50" width="70" height="17" rx="8.5" fill="#141620" stroke="#31364b" stroke-width="1.2"/>
    <text x="82" y="62" text-anchor="middle" font-family="sans-serif" font-weight="bold" font-size="9" fill="#50577f">L1</text>

    <!-- R1 Bumper -->
    <rect x="283" y="50" width="70" height="17" rx="8.5" fill="#141620" stroke="#31364b" stroke-width="1.2"/>
    <text x="318" y="62" text-anchor="middle" font-family="sans-serif" font-weight="bold" font-size="9" fill="#50577f">R1</text>

    <!-- Touchpad grande central (PadPress - Botão 13) -->
    <rect x="135" y="50" width="130" height="46" rx="6" fill="url(#touchpad-grad)" stroke="#2b2f42" stroke-width="1.5"/>
    <rect x="138" y="53" width="124" height="40" rx="4" fill="none" stroke="#2563eb" stroke-width="1" opacity="0.4" filter="url(#glow-led)"/>
    <text x="200" y="77" text-anchor="middle" font-family="sans-serif" font-weight="bold" font-size="9" fill="#3b82f6" opacity="0.75" letter-spacing="1.5">TOUCHPAD</text>

    <!-- Botões de Controle Centrais -->
    <!-- Share Button (Esquerdo) -->
    <rect x="120" y="60" width="10" height="16" rx="2" fill="#141620" stroke="#2a2e3f" stroke-width="1.2"/>
    <line x1="125" y1="64" x2="125" y2="72" stroke="#6b7280" stroke-width="1.5" stroke-linecap="round"/>

    <!-- Options Button (Direito) -->
    <rect x="270" y="60" width="10" height="16" rx="2" fill="#141620" stroke="#2a2e3f" stroke-width="1.2"/>
    <polygon points="273,64 277,68 273,72" fill="#6b7280"/>

    <!-- Direcional (D-PAD - Playstation Style individual buttons layout) -->
    <!-- Base Circular recuada no lado esquerdo superior -->
    <circle cx="105" cy="115" r="28" fill="#090a0d" stroke="#212431" stroke-width="1.5"/>
    
    <!-- Botões D-pad Individuais -->
    <!-- D-Up (Botão 11) -->
    <path d="M 101 92 C 101 90, 109 90, 109 92 L 109 104 C 109 105, 101 105, 101 104 Z" fill="url(#dpad-grad)" stroke="#31364b" stroke-width="1"/>
    <polygon points="105,94 102,99 108,99" fill="#64748b"/>

    <!-- D-Down (Botão 12) -->
    <path d="M 101 138 C 101 137, 109 137, 109 138 L 109 126 C 109 125, 101 125, 101 126 Z" fill="url(#dpad-grad)" stroke="#31364b" stroke-width="1"/>
    <polygon points="105,136 102,131 108,131" fill="#64748b"/>

    <!-- D-Left (Botão 13) -->
    <path d="M 82 111 C 80 111, 80 119, 82 119 L 94 119 C 95 119, 95 111, 94 111 Z" fill="url(#dpad-grad)" stroke="#31364b" stroke-width="1"/>
    <polygon points="84,115 89,112 89,118" fill="#64748b"/>

    <!-- D-Right (Botão 14) -->
    <path d="M 128 111 C 130 111, 130 119, 128 119 L 116 119 C 115 119, 115 111, 116 111 Z" fill="url(#dpad-grad)" stroke="#31364b" stroke-width="1"/>
    <polygon points="126,115 121,112 121,118" fill="#64748b"/>

    <circle cx="105" cy="115" r="5" fill="#090a0d"/>

    <!-- Botões de Ação Playstation (Triângulo, Círculo, Cruz, Quadrado no lado direito superior) -->
    <!-- Base Circular recuada -->
    <circle cx="295" cy="115" r="28" fill="#090a0d" stroke="#212431" stroke-width="1.5"/>

    <!-- Triangle Button (Triângulo - Botão 3) -->
    <g filter="url(#glow-led)">
      <circle cx="295" cy="93" r="11" fill="#141620" stroke="#10b981" stroke-width="1.2" opacity="0.85"/>
    </g>
    <polygon points="295,89 291,96 299,96" fill="none" stroke="#10b981" stroke-width="1.5" stroke-linejoin="round"/>

    <!-- Circle Button (Círculo - Botão 2) -->
    <g filter="url(#glow-led)">
      <circle cx="317" cy="115" r="11" fill="#141620" stroke="#f43f5e" stroke-width="1.2" opacity="0.85"/>
    </g>
    <circle cx="317" cy="115" r="5" fill="none" stroke="#f43f5e" stroke-width="1.5"/>

    <!-- Cross Button (Cruz/X - Botão 1) -->
    <g filter="url(#glow-led)">
      <circle cx="295" cy="137" r="11" fill="#141620" stroke="#3b82f6" stroke-width="1.2" opacity="0.85"/>
    </g>
    <line x1="291.5" y1="133.5" x2="298.5" y2="140.5" stroke="#3b82f6" stroke-width="1.8" stroke-linecap="round"/>
    <line x1="298.5" y1="133.5" x2="291.5" y2="140.5" stroke="#3b82f6" stroke-width="1.8" stroke-linecap="round"/>

    <!-- Square Button (Quadrado - Botão 0) -->
    <g filter="url(#glow-led)">
      <circle cx="273" cy="115" r="11" fill="#141620" stroke="#d946ef" stroke-width="1.2" opacity="0.85"/>
    </g>
    <rect x="269" y="111" width="8" height="8" rx="0.5" fill="none" stroke="#d946ef" stroke-width="1.5"/>

    <!-- PS/Home Button (PS - Botão 12) -->
    <circle cx="200" cy="145" r="10" fill="#141620" stroke="#3b82f6" stroke-width="1.5"/>
    <circle cx="200" cy="145" r="9" fill="none" stroke="#3b82f6" stroke-width="0.8" filter="url(#glow-led)" opacity="0.4"/>
    <!-- Logo PS Minimalista -->
    <text x="200" y="148" text-anchor="middle" font-family="sans-serif" font-weight="900" font-size="8" fill="#3b82f6" letter-spacing="-0.5">PS</text>

    <!-- Analógico Esquerdo Symmetrical (LS - Botão 10) -->
    <!-- Base com LED Ring Neon azul suave -->
    <circle cx="150" cy="168" r="25" fill="#090a0d" stroke="#212431" stroke-width="1"/>
    <circle cx="150" cy="168" r="24" fill="none" stroke="#2563eb" stroke-width="1" filter="url(#glow-led)" opacity="0.4"/>
    <circle cx="150" cy="168" r="22" fill="url(#stick-base)" stroke="#090a0d" stroke-width="1.5"/>
    
    <!-- Cúpula superior texturizada do analógico -->
    <circle cx="150" cy="168" r="14" fill="url(#stick-top)" stroke="#31364b" stroke-width="1"/>
    <circle cx="150" cy="168" r="10.5" fill="none" stroke="#0d0e14" stroke-width="1.5"/>
    <circle cx="150" cy="168" r="4.5" fill="#090a0d"/>

    <!-- Analógico Direito Symmetrical (RS - Botão 11) -->
    <!-- Base com LED Ring Neon azul suave -->
    <circle cx="250" cy="168" r="25" fill="#090a0d" stroke="#212431" stroke-width="1"/>
    <circle cx="250" cy="168" r="24" fill="none" stroke="#2563eb" stroke-width="1" filter="url(#glow-led)" opacity="0.4"/>
    <circle cx="250" cy="168" r="22" fill="url(#stick-base)" stroke="#090a0d" stroke-width="1.5"/>
    
    <!-- Cúpula superior texturizada do analógico -->
    <circle cx="250" cy="168" r="14" fill="url(#stick-top)" stroke="#31364b" stroke-width="1"/>
    <circle cx="250" cy="168" r="10.5" fill="none" stroke="#0d0e14" stroke-width="1.5"/>
    <circle cx="250" cy="168" r="4.5" fill="#090a0d"/>
  </g>
</svg>
