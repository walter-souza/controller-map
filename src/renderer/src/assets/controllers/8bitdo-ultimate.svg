<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 260" fill="none">
  <!-- Shadow/depth -->
  <ellipse cx="200" cy="248" rx="140" ry="12" fill="#00000030"/>

  <!-- Left grip -->
  <ellipse cx="90" cy="215" rx="58" ry="46" fill="#1e1e2c" stroke="#38384e" stroke-width="1.5"/>
  <!-- Right grip -->
  <ellipse cx="310" cy="215" rx="58" ry="46" fill="#1e1e2c" stroke="#38384e" stroke-width="1.5"/>

  <!-- Main body -->
  <rect x="45" y="58" width="310" height="158" rx="28" fill="#252536" stroke="#38384e" stroke-width="1.5"/>

  <!-- L2 trigger (top-left) -->
  <rect x="45" y="20" width="72" height="28" rx="10" fill="#1a1a28" stroke="#4a4a66" stroke-width="1.5"/>
  <text x="81" y="39" text-anchor="middle" font-family="monospace" font-size="11" fill="#6666aa">L2</text>

  <!-- L1 bumper (top-left) -->
  <rect x="47" y="50" width="70" height="17" rx="7" fill="#20202e" stroke="#4a4a66" stroke-width="1.2"/>
  <text x="82" y="63" text-anchor="middle" font-family="monospace" font-size="10" fill="#6666aa">L1</text>

  <!-- R2 trigger (top-right) -->
  <rect x="283" y="20" width="72" height="28" rx="10" fill="#1a1a28" stroke="#4a4a66" stroke-width="1.5"/>
  <text x="319" y="39" text-anchor="middle" font-family="monospace" font-size="11" fill="#6666aa">R2</text>

  <!-- R1 bumper (top-right) -->
  <rect x="283" y="50" width="70" height="17" rx="7" fill="#20202e" stroke="#4a4a66" stroke-width="1.2"/>
  <text x="318" y="63" text-anchor="middle" font-family="monospace" font-size="10" fill="#6666aa">R1</text>

  <!-- D-pad base ring -->
  <circle cx="110" cy="162" r="30" fill="#1a1a28" stroke="#38384e" stroke-width="1"/>
  <!-- D-pad arms -->
  <rect x="97" y="136" width="26" height="52" rx="5" fill="#141420"/>
  <rect x="83" y="150" width="54" height="24" rx="5" fill="#141420"/>
  <!-- D-pad center -->
  <circle cx="110" cy="162" r="9" fill="#1a1a28"/>
  <!-- D-pad direction hints -->
  <polygon points="110,140 106,148 114,148" fill="#555577"/>
  <polygon points="110,184 106,176 114,176" fill="#555577"/>
  <polygon points="86,162 94,158 94,166" fill="#555577"/>
  <polygon points="134,162 126,158 126,166" fill="#555577"/>

  <!-- Left stick ring -->
  <circle cx="155" cy="118" r="26" fill="#1a1a28" stroke="#38384e" stroke-width="1.5"/>
  <circle cx="155" cy="118" r="15" fill="#141420" stroke="#30304a" stroke-width="1"/>
  <circle cx="155" cy="118" r="6" fill="#252535"/>

  <!-- Right stick ring -->
  <circle cx="258" cy="162" r="26" fill="#1a1a28" stroke="#38384e" stroke-width="1.5"/>
  <circle cx="258" cy="162" r="15" fill="#141420" stroke="#30304a" stroke-width="1"/>
  <circle cx="258" cy="162" r="6" fill="#252535"/>

  <!-- ABXY cluster -->
  <!-- Y (top, triangle) -->
  <circle cx="292" cy="100" r="14" fill="#1a1a28" stroke="#38384e" stroke-width="1.5"/>
  <text x="292" y="105" text-anchor="middle" font-family="sans-serif" font-weight="bold" font-size="11" fill="#9999cc">Y</text>
  <!-- B (right, circle) -->
  <circle cx="315" cy="122" r="14" fill="#1a1a28" stroke="#38384e" stroke-width="1.5"/>
  <text x="315" y="127" text-anchor="middle" font-family="sans-serif" font-weight="bold" font-size="11" fill="#9999cc">B</text>
  <!-- A (bottom, cross/A) -->
  <circle cx="292" cy="144" r="14" fill="#1a1a28" stroke="#38384e" stroke-width="1.5"/>
  <text x="292" y="149" text-anchor="middle" font-family="sans-serif" font-weight="bold" font-size="11" fill="#9999cc">A</text>
  <!-- X (left, square) -->
  <circle cx="269" cy="122" r="14" fill="#1a1a28" stroke="#38384e" stroke-width="1.5"/>
  <text x="269" y="127" text-anchor="middle" font-family="sans-serif" font-weight="bold" font-size="11" fill="#9999cc">X</text>

  <!-- Center: Select (-) -->
  <rect x="164" y="100" width="26" height="15" rx="7" fill="#1a1a28" stroke="#38384e" stroke-width="1.2"/>
  <text x="177" y="112" text-anchor="middle" font-family="monospace" font-size="10" fill="#666688">−</text>

  <!-- Center: Home/Guide -->
  <circle cx="200" cy="88" r="12" fill="#1a1a28" stroke="#4a4a88" stroke-width="1.5"/>
  <circle cx="200" cy="88" r="6" fill="#252550"/>
  <text x="200" y="93" text-anchor="middle" font-family="monospace" font-size="9" fill="#8888cc">⌂</text>

  <!-- Center: Start (+) -->
  <rect x="210" y="100" width="26" height="15" rx="7" fill="#1a1a28" stroke="#38384e" stroke-width="1.2"/>
  <text x="223" y="112" text-anchor="middle" font-family="monospace" font-size="10" fill="#666688">+</text>

  <!-- Subtle grip texture lines -->
  <line x1="62" y1="195" x2="75" y2="240" stroke="#2a2a3c" stroke-width="3" stroke-linecap="round"/>
  <line x1="78" y1="198" x2="85" y2="242" stroke="#2a2a3c" stroke-width="3" stroke-linecap="round"/>
  <line x1="316" y1="198" x2="323" y2="242" stroke="#2a2a3c" stroke-width="3" stroke-linecap="round"/>
  <line x1="328" y1="195" x2="338" y2="240" stroke="#2a2a3c" stroke-width="3" stroke-linecap="round"/>
</svg>
