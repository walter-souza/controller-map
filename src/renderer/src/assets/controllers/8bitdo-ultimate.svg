<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 260" fill="none">
  <!-- Filtros e Efeitos Especiais de Iluminação e Sombra -->
  <defs>
    <!-- Sombra projetada do controle -->
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="6" stdDeviation="5" flood-color="#000000" flood-opacity="0.45"/>
    </filter>
    
    <!-- Efeito de brilho de LED (Glow) -->
    <filter id="glow-led" x="-25%" y="-25%" width="150%" height="150%">
      <feGaussianBlur stdDeviation="1.8" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>

    <!-- Gradientes para Carcaça e Punhos -->
    <linearGradient id="body-grad" x1="200" y1="58" x2="200" y2="216" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#242838" />
      <stop offset="40%" stop-color="#191c28" />
      <stop offset="100%" stop-color="#0e1016" />
    </linearGradient>

    <!-- Gradiente dos Analógicos -->
    <radialGradient id="stick-base" cx="50%" cy="50%" r="50%">
      <stop offset="70%" stop-color="#0d0e13" />
      <stop offset="90%" stop-color="#1a1d27" />
      <stop offset="100%" stop-color="#2d3246" />
    </radialGradient>

    <linearGradient id="stick-top" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2c3044" />
      <stop offset="100%" stop-color="#11131a" />
    </linearGradient>

    <!-- Gradientes de Metal dos Gatilhos -->
    <linearGradient id="metal-trigger" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#34394f" />
      <stop offset="50%" stop-color="#1e212f" />
      <stop offset="100%" stop-color="#11121a" />
    </linearGradient>

    <!-- Gradiente do D-pad -->
    <linearGradient id="dpad-grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2d3248" />
      <stop offset="50%" stop-color="#1c1e2b" />
      <stop offset="100%" stop-color="#0e0f15" />
    </linearGradient>
  </defs>

  <!-- Sombra de profundidade sob o controle -->
  <rect x="45" y="62" width="310" height="158" rx="30" fill="#000000" opacity="0.35" filter="blur(6px)"/>

  <!-- CONJUNTO DO CONTROLE (Sem pés, layout Xbox legítimo com analógicos robustos) -->
  <g filter="url(#shadow)">
    <!-- Chassi Principal (Corpo do Controle) -->
    <rect x="45" y="58" width="310" height="158" rx="30" fill="url(#body-grad)" stroke="#31364d" stroke-width="2"/>
    
    <!-- Linha de contorno interna elegante da faceplate (Bezel) -->
    <rect x="48" y="61" width="304" height="152" rx="27" fill="none" stroke="#ffffff" stroke-width="1" opacity="0.06"/>

    <!-- Gatilhos Superiores L2 e R2 (Com bordas arredondadas e chanfros suaves) -->
    <!-- L2 Trigger -->
    <rect x="45" y="20" width="72" height="28" rx="14" fill="url(#metal-trigger)" stroke="#484f6d" stroke-width="1.2"/>
    <text x="81" y="38" text-anchor="middle" font-family="sans-serif" font-weight="900" font-size="11" fill="#4b5275" letter-spacing="1">L2</text>

    <!-- R2 Trigger -->
    <rect x="283" y="20" width="72" height="28" rx="14" fill="url(#metal-trigger)" stroke="#484f6d" stroke-width="1.2"/>
    <text x="319" y="38" text-anchor="middle" font-family="sans-serif" font-weight="900" font-size="11" fill="#4b5275" letter-spacing="1">R2</text>

    <!-- Bumpers L1 e R1 (Com cantos arredondados estilo cápsula) -->
    <!-- L1 Bumper -->
    <rect x="47" y="50" width="70" height="17" rx="8.5" fill="#181a24" stroke="#373d56" stroke-width="1.2"/>
    <text x="82" y="62" text-anchor="middle" font-family="sans-serif" font-weight="bold" font-size="9" fill="#58618c">L1</text>

    <!-- R1 Bumper -->
    <rect x="283" y="50" width="70" height="17" rx="8.5" fill="#181a24" stroke="#373d56" stroke-width="1.2"/>
    <text x="318" y="62" text-anchor="middle" font-family="sans-serif" font-weight="bold" font-size="9" fill="#58618c">R1</text>

    <!-- Analógico Esquerdo (LS - Robusto, reposicionado para maior espaçamento) -->
    <!-- Base com LED Ring Neon -->
    <circle cx="105" cy="115" r="26" fill="#0d0e13" stroke="#2a2e41" stroke-width="1"/>
    <circle cx="105" cy="115" r="25" fill="none" stroke="#3b82f6" stroke-width="1.2" filter="url(#glow-led)" opacity="0.75"/>
    <circle cx="105" cy="115" r="23" fill="url(#stick-base)" stroke="#0e1015" stroke-width="1.5"/>
    
    <!-- Cúpula superior texturizada do analógico -->
    <circle cx="105" cy="115" r="15" fill="url(#stick-top)" stroke="#3a3f5a" stroke-width="1"/>
    <circle cx="105" cy="115" r="11.5" fill="none" stroke="#121319" stroke-width="1.5"/>
    <circle cx="105" cy="115" r="5" fill="#0e0f14"/>

    <!-- Direcional (D-PAD - Posicionado com espaçamento ideal) -->
    <!-- Base Circular recuada -->
    <circle cx="155" cy="162" r="28" fill="#0d0e13" stroke="#25293a" stroke-width="1.5"/>
    
    <!-- Corpo em Cruz do D-pad -->
    <path d="M 148 138 C 148 136, 162 136, 162 138 L 162 155 L 179 155 C 181 155, 181 169, 179 169 L 162 169 L 162 186 C 162 188, 148 188, 148 186 L 148 169 L 131 169 C 129 169, 129 155, 131 155 L 148 155 Z" fill="url(#dpad-grad)" stroke="#373c56" stroke-width="1.2" stroke-linejoin="round"/>
    
    <!-- Centro do D-pad recuado -->
    <circle cx="155" cy="162" r="7" fill="#12141c"/>
    
    <!-- Setas nos direcionais -->
    <polygon points="155,140 151,146 159,146" fill="#4d5578"/>
    <polygon points="155,184 151,178 159,178" fill="#4d5578"/>
    <polygon points="133,162 139,158 139,166" fill="#4d5578"/>
    <polygon points="177,162 171,158 171,166" fill="#4d5578"/>

    <!-- Analógico Direito (RS - Robusto, movido levemente para a esquerda para espaçamento perfeito com ABXY) -->
    <!-- Base com LED Ring Neon -->
    <circle cx="248" cy="162" r="26" fill="#0d0e13" stroke="#2a2e41" stroke-width="1"/>
    <circle cx="248" cy="162" r="25" fill="none" stroke="#3b82f6" stroke-width="1.2" filter="url(#glow-led)" opacity="0.75"/>
    <circle cx="248" cy="162" r="23" fill="url(#stick-base)" stroke="#0e1015" stroke-width="1.5"/>
    
    <!-- Cúpula superior texturizada do analógico -->
    <circle cx="248" cy="162" r="15" fill="url(#stick-top)" stroke="#3a3f5a" stroke-width="1"/>
    <circle cx="248" cy="162" r="11.5" fill="none" stroke="#121319" stroke-width="1.5"/>
    <circle cx="248" cy="162" r="5" fill="#0e0f14"/>

    <!-- Botões de Ação ABXY (Estilo Premium Cristal com raio equilibrado de 12px) -->
    <!-- Y Button -->
    <g filter="url(#glow-led)">
      <circle cx="292" cy="100" r="12" fill="#13151f" stroke="#eab308" stroke-width="1.2" opacity="0.85"/>
    </g>
    <circle cx="292" cy="100" r="10.5" fill="#171926" stroke="#ffffff" stroke-width="0.5" opacity="0.1"/>
    <text x="292" y="104" text-anchor="middle" font-family="sans-serif" font-weight="900" font-size="11" fill="#eab308">Y</text>

    <!-- B Button -->
    <g filter="url(#glow-led)">
      <circle cx="315" cy="122" r="12" fill="#13151f" stroke="#f43f5e" stroke-width="1.2" opacity="0.85"/>
    </g>
    <circle cx="315" cy="122" r="10.5" fill="#171926" stroke="#ffffff" stroke-width="0.5" opacity="0.1"/>
    <text x="315" y="126" text-anchor="middle" font-family="sans-serif" font-weight="900" font-size="11" fill="#f43f5e">B</text>

    <!-- A Button -->
    <g filter="url(#glow-led)">
      <circle cx="292" cy="144" r="12" fill="#13151f" stroke="#3b82f6" stroke-width="1.2" opacity="0.85"/>
    </g>
    <circle cx="292" cy="144" r="10.5" fill="#171926" stroke="#ffffff" stroke-width="0.5" opacity="0.1"/>
    <text x="292" y="148" text-anchor="middle" font-family="sans-serif" font-weight="900" font-size="11" fill="#3b82f6">A</text>

    <!-- X Button -->
    <g filter="url(#glow-led)">
      <circle cx="269" cy="122" r="12" fill="#13151f" stroke="#10b981" stroke-width="1.2" opacity="0.85"/>
    </g>
    <circle cx="269" cy="122" r="10.5" fill="#171926" stroke="#ffffff" stroke-width="0.5" opacity="0.1"/>
    <text x="269" y="126" text-anchor="middle" font-family="sans-serif" font-weight="900" font-size="11" fill="#10b981">X</text>

    <!-- Botões de Controle Centrais (Espaçamento perfeito) -->
    <!-- Select Button (-) -->
    <rect x="160" y="99" width="22" height="11" rx="5.5" fill="#13151f" stroke="#32374e" stroke-width="1.5"/>
    <line x1="167" y1="104.5" x2="175" y2="104.5" stroke="#6b7280" stroke-width="2" stroke-linecap="round"/>

    <!-- Start Button (+) -->
    <rect x="218" y="99" width="22" height="11" rx="5.5" fill="#13151f" stroke="#32374e" stroke-width="1.5"/>
    <line x1="225" y1="104.5" x2="233" y2="104.5" stroke="#6b7280" stroke-width="2" stroke-linecap="round"/>
    <line x1="229" y1="100.5" x2="229" y2="108.5" stroke="#6b7280" stroke-width="2" stroke-linecap="round"/>

    <!-- Home/Guide Button -->
    <circle cx="200" cy="86" r="10" fill="#13151f" stroke="#d97706" stroke-width="1.5"/>
    <circle cx="200" cy="86" r="9" fill="none" stroke="#eab308" stroke-width="0.8" filter="url(#glow-led)" opacity="0.5"/>
    <!-- Ícone de Casinha Home minimalista -->
    <path d="M 197 88 L 197 85.5 L 200 83 L 203 85.5 L 203 88 Z" fill="#eab308"/>
    <rect x="199" y="86" width="2" height="3" fill="#13151f"/>
  </g>
</svg>
